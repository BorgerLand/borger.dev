name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build book
        run: mdbook build
        env:
          PATH: ${{ github.workspace }}/.github/workflows:$PATH

      - name: Assemble site
        run: |
          mkdir -p _site/docs
          cp -r book/html/. _site/docs
          cp -r readme book/llms-txt-full/llms-full.txt index.html _site
          cp book/llms-txt-full/llms-full.txt _site/llms.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
